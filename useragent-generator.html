            window.location.replace("index.html");
        } else if (!user.plan || user.plan === 'Free') {
            alert(" Access Denied! Please enter a VIP code to unlock this tool.");
            window.location.replace("index.html"); 
        } else if (user.expiry && now > user.expiry) {
            alert(" Your premium access has expired! Please renew.");
            window.location.replace("index.html");
        }
    })();
</script>

            { brand: 'Realme', model: 'RMX3888', os: ['14', '15', '16'] }
        ];

        // --- IPHONE MODELS ---
        const IPHONE_MODELS = [
            'iPhone', 'iPhone', 'iPhone', 'iPhone', // iPhone 16
            'iPhone', 'iPhone', 'iPhone', 'iPhone', // iPhone 15
            'iPhone', 'iPhone', 'iPhone', 'iPhone', // iPhone 14
            'iPhone', 'iPhone', 'iPhone', 'iPhone'  // iPhone 13
        ];
        
        // --- OS & BROWSER VERSIONS (STRICT LATEST) ---
        // STRICTLY 26 FOR SAFARI AND IOS
        const IOS_VERSIONS = ['18_7'];
        const MAC_VERSIONS = ['26_5_2', '26_5']; 
        const WIN_VERSIONS = ['Windows NT 10.0; Win64; x64', 'Windows NT 11.0; Win64; x64'];

        // STRICTLY 150 FOR CHROME. NO 14x OR RANDOMIZATION.
        const BROWSERS = {
            'ChromeMobile': ['150.0.7871.61', '150.0.7871.47'], 
            'ChromePC': ['150.0.0.0', '150.0.7871.47'], 
            'Edge': ['150.0.4078.50', '150.0.4078.48'], 
            'Opera': ['133.0.5932.25', '133.0.5932.20'],
            'Firefox': ['152.0.5', '152.0.4'],
            'Safari': ['26.5.2', '26.5.1'] // STRICT 26
        };

        const APP_VERSIONS = {
            'Facebook': ['567.1.0.52.74', '568.0.0.35.80', '569.0.0.40.100'],
            'Instagram': ['435.0.0.0.37', '436.0.0.40.90', '437.0.0.50.105'],
            'TikTok': ['45.5.0', '45.6.1', '46.0.0'],
            'Twitter': ['12.1.0', '12.2.5', '12.3.0'],
            'LinkedIn': ['9.2.100', '9.3.50', '9.4.0'],
            'RedditAndroid': ['2026.16.1', '2026.17.0', '2026.18.2'],
            'RedditIOS': ['2026.16', '2026.17', '2026.18'],
            'WhatsApp': ['2.26.30.99', '2.26.35.10', '2.26.40.15'],
            'Snapchat': ['14.99.0.55', '15.10.0.20', '15.20.0.30'],
            'YouTube': ['20.55.40', '21.01.35', '21.05.50'],
            'Telegram': ['12.5.0', '12.6.1', '12.7.0']
        };

        const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
        const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        function generateAndroidBuild() {
            const prefixes = ['UP1A', 'TP1A', 'SP1A', 'UKQ1', 'RP1A', 'CP1A', 'BP1A', 'AP3A'];
            const year = randInt(24, 26);
            const month = String(randInt(1, 12)).padStart(2, '0');
            const day = String(randInt(1, 28)).padStart(2, '0');
            const revision = String(randInt(1, 999)).padStart(3, '0');
            const suffix = rand(['', '.A1', '.A2', '.B3']);
            return `${rand(prefixes)}.${year}${month}${day}.${revision}${suffix}`;
        }

        function generateUAs() {
            const qty = parseInt(document.getElementById('uaQty').value) || 10;
            const deviceSelection = document.querySelector('input[name="device"]:checked').value;
            let browser = document.querySelector('input[name="browser"]:checked').value;
            const inapp = document.querySelector('input[name="inapp"]:checked').value;
            const geoValue = document.querySelector('input[name="country"]:checked').value;
            const geoUnder = geoValue.replace('-', '_'); 

            if(browser === 'None' && inapp === 'None') {
                browser = 'Chrome';
            }

            if ((deviceSelection === 'Windows 10' || deviceSelection === 'Windows 11' || deviceSelection === 'Mac') && browser === 'None') {
                browser = 'Chrome'; 
            }

            const generatedUAs = new Set();
            let loops = 0; 
            const maxLoops = qty * 100; 

            const mixDeviceTypes = ['Android', 'iPhone', 'Windows 10', 'Windows 11', 'Mac'];

            while (generatedUAs.size < qty && loops < maxLoops) {
                loops++;
                let ua = "";

                let currentDevice = deviceSelection;
                if (deviceSelection === 'Random Mix') {
                    currentDevice = rand(mixDeviceTypes);
                }

                // STRICTLY GET 150.x CHROME, 150.x EDGE, 152.x FIREFOX, 133.x OPERA, 26.x SAFARI
                const chromeMobile = rand(BROWSERS['ChromeMobile']);
                const chromePC = rand(BROWSERS['ChromePC']);
                const chromeCore = (currentDevice === 'Android' || currentDevice === 'iPhone' || currentDevice === 'iPad') ? chromeMobile : chromePC;
                const edgeCore = rand(BROWSERS['Edge']);
                const firefoxCore = rand(BROWSERS['Firefox']);
                const firefoxMajor = firefoxCore.split('.')[0];
                const operaCore = rand(BROWSERS['Opera']);
                const safariCore = rand(BROWSERS['Safari']);

                // ==========================================
                // BASE OS STRING CONSTRUCTION
                // ==========================================
                if (currentDevice === 'Android') {
                    // Get Brand logic 
                    let selBrand = document.querySelector('input[name="brand"]:checked').value;
                    let currentBrand = selBrand;
                    if (selBrand === 'Random' || deviceSelection === 'Random Mix') {
                        currentBrand = rand(['Samsung', 'Google', 'Motorola', 'OnePlus', 'Xiaomi', 'Oppo', 'Vivo', 'Realme']);
                    }
                    
                    let availableModels = ANDROID_MODELS.filter(m => m.brand === currentBrand);
                    // Fallback to Samsung if brand not found (safety)
                    if (availableModels.length === 0) availableModels = ANDROID_MODELS.filter(m => m.brand === 'Samsung');
                    
                    let chosenModelObj = rand(availableModels);
                    
                    let modelName = chosenModelObj.model;
                    let androidOsVer = rand(chosenModelObj.os); // Strictly matches 14, 15, 16 
                    let build = generateAndroidBuild();
                    
                    if (browser === 'Chrome') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 EdgA/${edgeCore}`;
                    } else if (browser === 'Firefox') {
                        ua = `Mozilla/5.0 (Android ${androidOsVer}; Mobile; ${modelName} Build/${build}; rv:${firefoxMajor}.0) Gecko/${firefoxMajor}.0 Firefox/${firefoxCore}`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 OPR/${operaCore}`;
                    } else if (browser === 'Safari') {
                        // Fallback to Chrome format for Android Webkit requests
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${modelName} Build/${build}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36`;
                    }

                } else if (currentDevice === 'iPhone' || currentDevice === 'iPad') {
                    const isIpad = currentDevice === 'iPad';
                    const osVerRaw = rand(IOS_VERSIONS); // strictly 26_x_x
                    const osVerUnder = osVerRaw; 
                    const osVerDot = osVerRaw.replace(/_/g, '.'); // Dynamic Safari Sync (e.g. 26.5.2)
                    
                    const hw = isIpad ? 'iPad' + randInt(13, 16) + ',' + randInt(1, 8) : rand(IPHONE_MODELS);
                    const base = isIpad ? `${hw}; CPU OS ${osVerUnder} like Mac OS X` : `${hw}; CPU iPhone OS ${osVerUnder} like Mac OS X`;
                    const safBuild = rand(['15E148', '21E219', '21H20', '23D8133']);

                    if (browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${osVerDot} Mobile/${safBuild} Safari/604.1`;
                    } else if (browser === 'Chrome') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) CriOS/${chromeCore} Mobile/${safBuild} Safari/604.1`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${osVerDot} Mobile/${safBuild} Safari/604.1 EdgiOS/${edgeCore}`;
                    } else if (browser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) FxiOS/${firefoxCore} Mobile/${safBuild} Safari/605.1.15`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) OPiOS/${operaCore} Mobile/${safBuild} Safari/605.1.15`;
                    }

                } else if (currentDevice === 'Windows 10' || currentDevice === 'Windows 11') {
                    const base = currentDevice === 'Windows 11' ? 'Windows NT 11.0; Win64; x64' : 'Windows NT 10.0; Win64; x64';

                    if (browser === 'Chrome' || browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36`;
                    } else if (browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 Edg/${edgeCore}`;
                    } else if (browser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}; rv:${firefoxMajor}.0) Gecko/20100101 Firefox/${firefoxCore}`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 OPR/${operaCore}`;
                    }

                } else if (currentDevice === 'Mac') {
                    const macVer = rand(MAC_VERSIONS);
                    const base = `Macintosh; Intel Mac OS X ${macVer}`;

                    if (browser === 'Safari') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/${safariCore} Safari/605.1.15`;
                    } else if (browser === 'Chrome' || browser === 'Edge') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36`;
                        if(browser === 'Edge') ua += ` Edg/${edgeCore}`;
                    } else if (browser === 'Firefox') {
                        ua = `Mozilla/5.0 (${base}; rv:${firefoxMajor}.0) Gecko/20100101 Firefox/${firefoxCore}`;
                    } else if (browser === 'Opera') {
                        ua = `Mozilla/5.0 (${base}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Safari/537.36 OPR/${operaCore}`;
                    }
                }

                // ==========================================
                // IN-APP BROWSER STRINGS
                // ==========================================
                if (inapp !== 'None') {
                    let appString = "";

                    if (currentDevice === 'Android') {
                        // Re-resolve strictly if random mix
                        let selBrand = document.querySelector('input[name="brand"]:checked').value;
                        let currentBrand = selBrand;
                        if (selBrand === 'Random' || deviceSelection === 'Random Mix') {
                            currentBrand = rand(['Samsung', 'Google', 'Motorola', 'OnePlus', 'Xiaomi', 'Oppo', 'Vivo', 'Realme']);
                        }
                        let availableModels = ANDROID_MODELS.filter(m => m.brand === currentBrand);
                        if (availableModels.length === 0) availableModels = ANDROID_MODELS.filter(m => m.brand === 'Samsung');
                        
                        let chosenModelObj = rand(availableModels);
                        let hw = chosenModelObj.model;
                        let androidOsVer = rand(chosenModelObj.os);
                        let build = generateAndroidBuild();
                        
                        ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${hw} Build/${build}; wv) AppleWebKit/537.36 (KHTML, like Gecko) Version/4.0 Chrome/${chromeCore} Mobile Safari/537.36`;
                        
                        const density = rand(['3.0', '2.75', '4.0']);
                        const w = rand(['1080', '1440']);
                        const h = rand(['2400', '3120']);

                        if (inapp === 'Facebook') {
                            appString = ` [FB_IAB/FB4A;FBAV/${rand(APP_VERSIONS['Facebook'])};FBLC/${geoUnder};FBMF/${currentBrand.toLowerCase()};FBDV/${hw};FBSV/${androidOsVer};FBSS/1;FBID/phone;FBNG/4G;FBSR/1;FBOP/1;FBRV/0;IABMV/1]`;
                        } else if (inapp === 'Instagram') {
                            const apiLvl = parseInt(androidOsVer) + 20; 
                            appString = ` Instagram ${rand(APP_VERSIONS['Instagram'])} Android (${apiLvl}/${androidOsVer}; ${density.replace('.','')}dpi; ${w}x${h}; ${currentBrand.toLowerCase()}; ${hw}; qcom; ${geoUnder}; ${randInt(100000000, 1999999999)}; IABMV/1)`;
                        } else if (inapp === 'TikTok') {
                            ua = `com.ss.android.ugc.trill/${randInt(440000, 450000)} (Linux; U; Android ${androidOsVer}; ${geoUnder}; ${hw}; Build/${build}; Cronet/TTNetVersion:b4d74d15 2026-01-23)`;
                            appString = "";
                        } else if (inapp === 'Twitter') {
                            ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${hw}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 TwitterAndroid/${rand(APP_VERSIONS['Twitter'])} Locale/${geoUnder}`;
                            appString = "";
                        } else if (inapp === 'LinkedIn') {
                            ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${hw}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 LinkedInApp/${rand(APP_VERSIONS['LinkedIn'])} (${geoUnder})`;
                            appString = "";
                        } else if (inapp === 'Snapchat') {
                            ua = `Snapchat/${rand(APP_VERSIONS['Snapchat'])} (Android ${androidOsVer}; ${hw})`;
                            appString = "";
                        } else if (inapp === 'WhatsApp') {
                            ua = `WhatsApp/${rand(APP_VERSIONS['WhatsApp'])} A`;
                            appString = "";
                        } else if (inapp === 'Reddit') {
                            ua = `Reddit/Version ${rand(APP_VERSIONS['RedditAndroid'])}/Build ${randInt(1000000, 9999999)} (${hw}; Android ${androidOsVer})`;
                            appString = "";
                        } else if (inapp === 'Telegram') {
                            ua = `Mozilla/5.0 (Linux; Android ${androidOsVer}; ${hw}) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/${chromeCore} Mobile Safari/537.36 (telegram)`;
                            appString = "";
                        } else if (inapp === 'YouTube') {
                            ua = `com.google.android.youtube/${rand(APP_VERSIONS['YouTube'])} (Linux; U; Android ${androidOsVer}; ${geoUnder}; ${hw} Build/${build})`;
                            appString = "";
                        }

                    } else if (currentDevice === 'iPhone' || currentDevice === 'iPad') {
                         const isIpad = currentDevice === 'iPad';
                         const osVerRaw = rand(IOS_VERSIONS);
                         const osVerUnder = osVerRaw;
                         const osVerDot = osVerRaw.replace(/_/g, '.');
                         const hw = isIpad ? 'iPad' + randInt(13, 16) + ',' + randInt(1, 8) : rand(IPHONE_MODELS);
                         
                         ua = `Mozilla/5.0 (${hw}; CPU ${isIpad?'OS':'iPhone OS'} ${osVerUnder} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/${rand(['15E148', '21E219', '21H20', '23D8133'])}`;
                         
                         if (inapp === 'Facebook') {
                            appString = ` Safari/604.1 [FBAN/FBIOS;FBAV/${rand(APP_VERSIONS['Facebook'])};FBBV/${randInt(800000000, 999999999)};FBDV/${hw};FBMD/${currentDevice==='iPad'?'iPad':'iPhone'};FBSN/iOS;FBSV/${osVerDot};FBSS/3;FBID/phone;FBLC/${geoUnder};FBOP/5;FBRV/${randInt(80000000, 99999999)};IABMV/1]`;
                         } else if (inapp === 'Instagram') {
                            appString = ` Instagram ${rand(APP_VERSIONS['Instagram'])} (${hw}; iOS ${osVerDot}; ${geoUnder}; en; scale=3.00; 1170x2532; ${randInt(1000000000, 1999999999)}; IABMV/1)`;
                         } else if (inapp === 'TikTok') {
                            ua = `Mozilla/5.0 (${hw}; CPU ${isIpad?'OS':'iPhone OS'} ${osVerUnder} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) TikTok/${rand(APP_VERSIONS['TikTok'])} (iOS ${osVerDot}; ${geoUnder})`;
                            appString = "";
                         } else if (inapp === 'Twitter') {
                            ua = `Mozilla/5.0 (${hw}; CPU ${isIpad?'OS':'iPhone OS'} ${osVerUnder} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/${rand(['15E148', '21E219'])} TwitteriPhone/${rand(APP_VERSIONS['Twitter'])} Locale/${geoUnder}`;
                            appString = "";
                         } else if (inapp === 'LinkedIn') {
                            ua = `Mozilla/5.0 (${hw}; CPU ${isIpad?'OS':'iPhone OS'} ${osVerUnder} like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/${rand(['15E148', '21E219'])} LinkedInApp/${rand(APP_VERSIONS['LinkedIn'])} (${geoUnder})`;
                            appString = "";
                         } else if (inapp === 'Snapchat') {
                            ua = `Snapchat/${rand(APP_VERSIONS['Snapchat'])} (iOS ${osVerDot}; ${hw})`;
                            appString = "";
                         } else if (inapp === 'WhatsApp') {
                            ua = `WhatsApp/${rand(APP_VERSIONS['WhatsApp'])} i`;
                            appString = "";
                         } else if (inapp === 'Reddit') {
                            ua = `Reddit/Version ${rand(APP_VERSIONS['RedditIOS'])}/Build ${randInt(1000000, 9999999)} (${hw}; iOS ${osVerDot})`;
                            appString = "";
                         } else if (inapp === 'Telegram') {
                            ua = `Telegram/${rand(APP_VERSIONS['Telegram'])} (${hw}; iOS ${osVerDot})`;
                            appString = "";
                         } else if (inapp === 'YouTube') {
                            ua = `com.google.ios.youtube/${rand(APP_VERSIONS['YouTube'])} (${hw.replace('iPhone','')}; U; CPU iPhone OS ${osVerUnder} like Mac OS X; ${geoUnder})`;
                            appString = "";
                         }
                    } else {
                        appString = ` ${inapp}PC/${randInt(10, 99)}.0`;
                    }

                    ua = ua + appString;
                }

                if(ua !== "") {
                    generatedUAs.add(ua);
                }
            }

            renderOutput(Array.from(generatedUAs));
        }

        function renderOutput(uaList) {
            const container = document.getElementById('outputContainer');
            const emptyState = document.getElementById('emptyState');
            const copyAllBtn = document.getElementById('copyAllBtn');
            const countDisplay = document.getElementById('resCount');

            container.innerHTML = '';
            countDisplay.innerText = uaList.length;

            if (uaList.length === 0) {
                emptyState.classList.remove('hidden');
                container.classList.add('hidden');
                copyAllBtn.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.classList.remove('hidden');
            copyAllBtn.classList.remove('hidden');

            uaList.forEach((ua) => {
                const div = document.createElement('div');
                div.className = 'ua-list-item';
                
                const code = document.createElement('code');
                code.className = 'text-slate-300 font-mono text-[12px] md:text-[13px] break-all flex-grow font-semibold';
                code.textContent = ua;

                const copyBtn = document.createElement('button');
                copyBtn.className = 'shrink-0 bg-[#020617] hover:bg-emerald-600 text-slate-300 hover:text-white border border-white/10 hover:border-emerald-500 text-xs font-bold py-2.5 px-5 rounded-xl transition-all flex items-center justify-center gap-2 w-full md:w-auto shadow-md';
                copyBtn.innerHTML = '<i class="ph-bold ph-copy text-sm"></i> Copy';
                
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(ua).then(() => {
                        const originalHtml = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="ph-bold ph-check text-emerald-400 text-sm"></i> Copied!';
                        copyBtn.classList.add('border-emerald-500');
                        setTimeout(() => {
                            copyBtn.innerHTML = originalHtml;
                            copyBtn.classList.remove('border-emerald-500');
                        }, 2000);
                    });
                };

                div.appendChild(code);
                div.appendChild(copyBtn);
                container.appendChild(div);
            });
        }

        function copyAll() {
            const container = document.getElementById('outputContainer');
            const items = container.querySelectorAll('code');
            if (items.length === 0) return;
            
            const copyAllBtn = document.getElementById('copyAllBtn');
            const textToCopy = Array.from(items).map(code => code.textContent).join('\n');
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalHtml = copyAllBtn.innerHTML;
                copyAllBtn.innerHTML = '<i class="ph-bold ph-check text-white text-lg"></i> All Copied!';
                copyAllBtn.classList.replace('bg-slate-800', 'bg-emerald-600');
                
                setTimeout(() => {
                    copyAllBtn.innerHTML = originalHtml;
                    copyAllBtn.classList.replace('bg-emerald-600', 'bg-slate-800');
                }, 2000);
            });
        }
    </script>
</body>
